<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Shiyu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <style>
    /* ── blog.html 固有スタイル ── */

    /* カテゴリフィルター */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--white);
      border: 1px solid var(--border);
      padding: 7px 16px;
      cursor: pointer;
      border-radius: 1px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      color: var(--accent);
      border-color: var(--accent-light);
      background: var(--accent-pale);
    }

    /* 記事カード（post-card は共通CSSにあるので上書き分のみ） */
    .post-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .post-count span {
      color: var(--accent);
      font-size: 13px;
    }

    /* カテゴリバッジ（post-tag を上書きして色を変えられるよう追加クラス） */
    .cat-travel   { color: #1a9aa0; border-color: #1a9aa0; }
    .cat-diary    { color: #7a6fa8; border-color: #7a6fa8; }
    .cat-railroad { color: #c47a2a; border-color: #c47a2a; }

    /* 記事が非表示になるときのアニメーション */
    .post-card {
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s, opacity 0.3s;
    }
    .post-card.hidden {
      display: none;
    }

    /* 空状態 */
    .empty-state {
      padding: 64px 0;
      text-align: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      display: none;
    }
    .empty-state.visible { display: block; }

    @media (max-width: 900px) {
      .filter-bar { gap: 6px; }
    }
  </style>
</head>
<body>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <a href="index.html" class="sidebar-logo">志<em>游</em></a>
    <p class="sidebar-tagline">～記録と記憶をここに～</p>

    <div class="sidebar-profile">
      <p class="profile-name">しゆ（shiyu）</p>
    </div>

    <ul class="sidebar-nav">
      <li><a href="index.html"><span class="nav-num">00</span>Home</a></li>
      <li><a href="#" class="active"><span class="nav-num">01</span>すべて</a></li>
      <li><a href="#" data-filter="activity"><span class="nav-num">02</span>活動（旅行・太鼓の達人）</a></li>
      <li><a href="#" data-filter="hobby"><span class="nav-num">03</span>趣味・日常</a></li>
      <li><a href="#" data-filter="soliloquy"><span class="nav-num">04</span>独言</a></li>
    </ul>

    <div class="sidebar-footer">
      <p>© 2026 Shiyu<br>All rights reserved.</p>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">

    <!-- Page Header -->
    <header class="page-header">
      <p class="section-label">// Blog</p>
      <h1>述懐</h1>
      <p>旅行や太鼓の達人といった活動についてから趣味や日常、独言まで様々残していきます。</p>
    </header>

    <!-- Blog List -->
    <section class="section" id="blog">

      <!-- フィルターバー -->
      <div class="filter-bar reveal">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="activity">活動（旅行・太鼓の達人）</button>
        <button class="filter-btn" data-filter="hobby">趣味・日常</button>
        <button class="filter-btn" data-filter="soliloguy">独言</button>
      </div>

      <p class="post-count reveal">全 <span id="post-count-num">1</span> 件</p>

      <!-- 記事リスト -->
      <div class="blog-list" id="blog-list">
        
      <!-- 記事ゼロの場合 -->
      <div class="empty-state" id="empty-state">
        まだ記事はありません
      </div>

    </section>

  </main>

  <script>
    // ── Scroll reveal ──
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // ── カテゴリフィルター（フィルターバー） ──
    const filterBtns = document.querySelectorAll('.filter-btn');
    const posts      = document.querySelectorAll('.post-card');
    const countEl   = document.getElementById('post-count-num');
    const emptyEl   = document.getElementById('empty-state');

    function applyFilter(filter) {
      let count = 0;
      posts.forEach(card => {
        const match = filter === 'all' || card.dataset.category === filter;
        card.classList.toggle('hidden', !match);
        if (match) count++;
      });
      countEl.textContent = count;
      emptyEl.classList.toggle('visible', count === 0);
    }

    // 初期表示：記事がなければ空状態を表示
    applyFilter('all');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.filter || 'all');
      });
    });

    // ── サイドバーナビからのフィルター ──
    const navLinks = document.querySelectorAll('.sidebar-nav a[data-filter]');
    navLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const filter = link.dataset.filter;
        // サイドナビのactive
        document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
        // フィルターボタンのactive
        filterBtns.forEach(b => {
          b.classList.toggle('active', b.dataset.filter === filter);
        });
        applyFilter(filter);
      });
    });

    // 「すべて」ナビリンク
    const allNavLink = document.querySelector('.sidebar-nav a:not([data-filter])');
    if (allNavLink) {
      allNavLink.addEventListener('click', e => {
        if (allNavLink.getAttribute('href') === '#') {
          e.preventDefault();
          document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
          allNavLink.classList.add('active');
          filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === 'all' || !b.dataset.filter));
          applyFilter('all');
        }
      });
    }
  </script>

</body>
</html>
